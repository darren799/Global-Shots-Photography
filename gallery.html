<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Shots Photography | Gallery</title>
  <meta name="description" content="View the photography gallery from Global Shots Photography.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="brand">Global Shots Photography</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a class="active" href="gallery.html">Gallery</a>
        <a href="packages.html">Packages</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section>
      <div class="container">
        <span class="eyebrow">A look at my recent work</span>
        <h1>Gallery</h1>
        <p class="muted">Click any image to view it larger.</p>

        <div class="gallery-grid">
          <div class="gallery-item" data-image="images/gallery-1.jpg" data-alt="Photo 1">
            <div class="gallery-photo"><img src="images/gallery-1.jpg" alt="Photo 1"></div>
          </div>
          <div class="gallery-item" data-image="images/gallery-2.jpg" data-alt="Photo 2">
            <div class="gallery-photo"><img src="images/gallery-2.jpg" alt="Photo 2"></div>
          </div>
          <div class="gallery-item" data-image="images/gallery-3.jpg" data-alt="Photo 3">
            <div class="gallery-photo"><img src="images/gallery-3.jpg" alt="Photo 3"></div>
          </div>
          <div class="gallery-item" data-image="images/gallery-4.jpg" data-alt="Photo 4">
            <div class="gallery-photo"><img src="images/gallery-4.jpg" alt="Photo 4"></div>
          </div>
          <div class="gallery-item" data-image="images/gallery-5.jpg" data-alt="Photo 5">
            <div class="gallery-photo"><img src="images/gallery-5.jpg" alt="Photo 5"></div>
          </div>
          <div class="gallery-item" data-image="images/gallery-6.jpg" data-alt="Photo 6">
            <div class="gallery-photo"><img src="images/gallery-6.jpg" alt="Photo 6"></div>
          </div>
          <div class="gallery-item" data-image="images/gallery-7.jpg" data-alt="Photo 7">
            <div class="gallery-photo"><img src="images/gallery-7.jpg" alt="Photo 7"></div>
          </div>
          <div class="gallery-item" data-image="images/gallery-8.jpg" data-alt="Photo 8">
            <div class="gallery-photo"><img src="images/gallery-8.jpg" alt="Photo 8"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>© <span id="year"></span> Global Shots Photography.</p>
    </div>
  </footer>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lightboxClose" aria-label="Close image">×</button>
      <img id="lightboxImage" src="" alt="Expanded gallery image">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
